name: ci

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches-ignore:
      - gh-pages

jobs:
  gcc_linux:
    strategy:
      matrix:
        platform: ['ubuntu-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  gcc_linux_march_native:
    strategy:
      matrix:
        platform: ['ubuntu-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-march=native -Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-march=native -Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  gcc_linux_valgrind:
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v5
      - name: Install valgrind
        run: |
            sudo apt update
            sudo apt install valgrind
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror -g" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror -g"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  gcc_linux_sanitizers:
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror -O1 -g -fsanitize=address -fsanitize=undefined -fno-sanitize-recover=all -fno-omit-frame-pointer" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror -O1 -g -fsanitize=address -fsanitize=undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2 --output-on-failure
      - name: benchmark
        run: ./benchmark 16389 100

  clang_linux:
    strategy:
      matrix:
        platform: ['ubuntu-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  clang_linux_march_native:
    strategy:
      matrix:
        platform: ['ubuntu-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-march=native -Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-march=native -Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  # AArch64 (arm64) Linux runners are free for public repositories.
  # This job builds the ARM SVE runtime dispatching code on a real
  # AArch64 CPU using GCC. It runs the ARM NEON fallback, or the ARM
  # SVE algorithm if the runner CPU supports SVE.
  # Our ARM SVE runtime dispatching code requires GCC >= 14 (see
  # libpopcnt.h), but Ubuntu 24.04 ships GCC 13 by default, hence we
  # install GCC 14. Otherwise the ARM SVE code path would be disabled
  # and we would only test the ARM NEON code path.
  # Note: GitHub does not provide an "ubuntu-latest-arm" label yet,
  # only versioned labels such as "ubuntu-24.04-arm". When this image
  # is eventually deprecated the label below needs to be bumped.
  # https://github.com/orgs/community/discussions/149392
  Linux_ARM_GCC:
    strategy:
      matrix:
        config: ['Debug', 'Release']
    runs-on: ubuntu-24.04-arm
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v5
      - name: Install GCC 14
        run: |
            sudo apt update
            sudo apt install -y gcc-14 g++-14
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  # Same as Linux_ARM_GCC, but using the Clang compiler. Ubuntu 24.04
  # ships Clang 18 which is >= the Clang 16 minimum required by our ARM
  # SVE runtime dispatching code, so no extra installation is needed.
  Linux_ARM_Clang:
    strategy:
      matrix:
        config: ['Debug', 'Release']
    runs-on: ubuntu-24.04-arm
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  clang_macos:
    strategy:
      matrix:
        platform: ['macos-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_INSTALL_PREFIX=$(pwd) -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wno-c++11-long-long -Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
            cmake --install .
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  msvc_windows_vs2022:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - name: Build libpopcnt
        run: |
            cmake . -G "Visual Studio 17 2022" -DCMAKE_CXX_FLAGS="/W3 /WX /MP /EHsc"
            cmake --build . --config Release --target install
      - name: CTest (unit tests)
        run: ctest -j2 -C Release --output-on-failure
      - name: benchmark
        run: Release\benchmark.exe 16389 100

  # See documentation: https://www.msys2.org/docs/ci/
  msvc_windows_mingw64:
    strategy:
      matrix:
        platform: ['windows-latest']
        config: ['Debug', 'Release']
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: base-devel mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake
      - name: Build libpopcnt
        run: |
            cmake . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
            cmake --build . --parallel --verbose
      - name: CTest (unit tests)
        run: ctest -j2
      - name: benchmark
        run: ./benchmark 16389 100

  clang_freebsd:
    strategy:
      matrix:
        config: ['Debug', 'Release']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and test libpopcnt
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
              pkg update
              pkg install -y cmake ninja
              CC=clang CXX=clang++ cmake . -G Ninja -DCMAKE_BUILD_TYPE=${{matrix.config}} -DCMAKE_C_FLAGS="-Wall -Wextra -pedantic -Werror" -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror"
              cmake --build . --parallel --verbose
              ctest -j2 --output-on-failure
              ./benchmark 16389 100
